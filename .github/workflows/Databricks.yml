name: Databricks CI/CD

on:
  push:
    branches:
      - develop
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Databricks CLI
        run: pip install databricks

      - name: Configure Databricks
        run: |
          mkdir -p ~/.databricks
          echo "[DEFAULT]" > ~/.databrickscfg
          echo "host = ${{ secrets.DATABRICKS_HOST }}" >> ~/.databrickscfg
          echo "token = ${{ secrets.DATABRICKS_TOKEN }}" >> ~/.databrickscfg

      - name: Deploy to DEV
        if: github.ref == 'refs/heads/develop'
        run: python -m databricks bundle deploy --target dev

      - name: Deploy to PROD
        if: github.ref == 'refs/heads/main'
        run: python -m databricks bundle deploy --target prod
